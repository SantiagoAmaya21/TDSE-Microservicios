# Spring Boot Configuration for Docker Environment

# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/twitter_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 Console (disabled in production)
spring.h2.console.enabled=false

# Auth0 Configuration
auth0.domain=${AUTH0_DOMAIN:your-auth0-domain.auth0.com}
auth0.audience=${AUTH0_AUDIENCE:your-api-identifier}

# Application Configuration
spring.application.name=twitter-like-app
spring.profiles.active=docker

# Logging Configuration
logging.level.com.tdse.twitter=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Health Check Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Redis Configuration (optional)
# spring.redis.host=redis
# spring.redis.port=6379
